<mat-card class="form-card">

    <h3>Novo Produto</h3>

    <div class="form-grid">

        <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput [(ngModel)]="name">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Preço</mat-label>
            <input matInput type="number" [(ngModel)]="price">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Estoque</mat-label>
            <input matInput type="number" [(ngModel)]="stock">
        </mat-form-field>

    </div>

    <button mat-raised-button color="primary" (click)="saveProduct()">
        {{ editingProductId ? 'Atualizar Produto' : 'Adicionar Produto' }}
    </button>

</mat-card>


<mat-card class="table-card">

    <table mat-table [dataSource]="products">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let p"> {{p.name}} </td>
        </ng-container>

        <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef> Preço </th>
            <td mat-cell *matCellDef="let p"> {{p.price}} </td>
        </ng-container>

        <ng-container matColumnDef="stock">
            <th mat-header-cell *matHeaderCellDef> Estoque </th>
            <td mat-cell *matCellDef="let p"> {{p.stock}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Ações </th>
            <td mat-cell *matCellDef="let p">

                <button mat-icon-button color="primary" (click)="editProduct(p)">
                    <mat-icon>edit</mat-icon>
                </button>

                <button mat-icon-button color="warn" (click)="deleteProduct(p.id)">
                    <mat-icon>delete</mat-icon>
                </button>

            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    </table>

</mat-card>
